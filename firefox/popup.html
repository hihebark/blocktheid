<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Blocktheid</h2>
    
    <div class="stats">
      <div class="stat-item">
        <span class="stat-value" id="statBlocked">0</span>
        <span class="stat-label">Blocked</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statBypassed">0</span>
        <span class="stat-label">Bypassed</span>
      </div>
    </div>
    
    <div class="settings">
      <label class="switch-label">
        <input type="checkbox" id="autoBlockToggle" checked>
        <span>Auto-block</span>
      </label>
    </div>
    
    <div class="platforms">
      <h3>Blocking</h3>
      <div class="platform-list">
        <label><input type="checkbox" class="platform-toggle" data-platform="vercel" checked> Vercel</label>
      </div>
    </div>
    
    <div class="blocked-list">
      <h3>Blocked <span id="count">(0)</span></h3>
      <div id="domainList" class="domain-list">
        <div class="empty-state">No domains blocked</div>
      </div>
    </div>
    
    <div class="actions">
      <button class="btn-action" id="exportBtn">Export</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
